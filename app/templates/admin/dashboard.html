{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 mt-2">
    <h2 class="fw-bold"><i class="bi bi-speedometer2 me-2"></i>歌曲管理儀表板</h2>
    <a href="{{ url_for('admin.new_song') }}" class="btn btn-success">
        <i class="bi bi-plus-lg me-1"></i>新增歌曲
    </a>
</div>

<div class="glass-card p-4">
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle mb-0" style="background: transparent;">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">歌名</th>
                    <th scope="col">歌手</th>
                    <th scope="col">風格</th>
                    <th scope="col">試聽連結</th>
                    <th scope="col" class="text-end">操作</th>
                </tr>
            </thead>
            <tbody>
                {% for song in songs %}
                <tr>
                    <td>{{ song.id }}</td>
                    <td class="fw-bold">{{ song.title }}</td>
                    <td>{{ song.artist }}</td>
                    <td><span class="badge bg-secondary">{{ song.style or '-' }}</span></td>
                    <td>
                        {% if song.audio_url %}
                            <a href="{{ song.audio_url }}" target="_blank" class="text-info text-decoration-none">連結</a>
                        {% else %}
                            <span class="text-muted">-</span>
                        {% endif %}
                    </td>
                    <td class="text-end">
                        <a href="{{ url_for('admin.edit_song', song_id=song.id) }}" class="btn btn-sm btn-outline-warning">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form action="{{ url_for('admin.delete_song', song_id=song.id) }}" method="POST" class="d-inline" onsubmit="return confirm('確定要刪除這首歌嗎？');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="6" class="text-center py-4 text-muted">目前資料庫中沒有任何歌曲</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
