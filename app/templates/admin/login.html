{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="glass-card p-5 text-center">
            <div class="mb-4 text-warning">
                <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
            </div>
            <h3 class="fw-bold mb-4">後台登入</h3>
            
            <form action="{{ url_for('admin.login') }}" method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autocomplete="username">
                    <label for="username" class="text-secondary">帳號</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                    <label for="password" class="text-secondary">密碼</label>
                </div>
                <button class="btn btn-light w-100 py-3 fw-bold rounded-pill" type="submit">登入</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
