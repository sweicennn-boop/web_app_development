{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 mt-2">
    <h2 class="fw-bold"><i class="bi bi-people me-2"></i>大家推薦的歌單</h2>
    <a href="{{ url_for('recommend.new_recommendation') }}" class="btn btn-gradient rounded-pill px-4">
        <i class="bi bi-plus-circle me-2"></i>我也要推薦
    </a>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for rec in recommendations %}
    <div class="col">
        <div class="glass-card h-100 p-4">
            <h4 class="fw-bold text-white mb-1">{{ rec.title }}</h4>
            <p class="text-secondary mb-3"><i class="bi bi-person me-2"></i>{{ rec.artist }}</p>
            {% if rec.reason %}
                <div class="p-3 rounded mb-3" style="background: rgba(255,255,255,0.05); font-style: italic;">
                    "{{ rec.reason }}"
                </div>
            {% endif %}
            <div class="text-end mt-auto">
                <small class="text-muted">— 推薦人：{{ rec.submitter_name or '匿名' }}</small>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <p class="text-secondary fs-5">目前還沒有通過審核的推薦歌曲，來成為第一個推薦的人吧！</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
